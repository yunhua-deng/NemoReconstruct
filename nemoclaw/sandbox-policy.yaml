version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  # Ollama inference on the host (via cluster gateway)
  ollama:
    name: ollama
    endpoints:
      - host: 172.20.0.1
        port: 11434
        protocol: tcp
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/node
      - path: /bin/bash

  # NemoReconstruct backend on the host
  nemo_reconstruct:
    name: nemo-reconstruct
    endpoints:
      - host: 172.20.0.1
        port: 8010
        protocol: tcp
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /usr/bin/node
      - path: /bin/bash

  # OpenClaw gateway on the host (for agent harness communication)
  openclaw_gateway:
    name: openclaw-gateway
    endpoints:
      - host: 172.20.0.1
        port: 18789
        protocol: tcp
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/node
      - path: /bin/bash

  # GitHub (read-only for git operations)
  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**/info/refs*
          - allow:
              method: POST
              path: /**/git-upload-pack
    binaries:
      - path: /usr/bin/git

  github_rest_api:
    name: github-rest-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**
          - allow:
              method: HEAD
              path: /**
    binaries:
      - path: /usr/bin/gh
