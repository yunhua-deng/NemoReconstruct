# OpenShell Sandbox Policy — Template
#
# Copy and customize for your project:
#   cp sandbox-policy-template.yaml sandbox-policy.yaml
#
# This defines what each sandboxed agent can access.
# Both Agent A and Agent B share the same policy (they need
# the same permissions). Each agent runs in its own ephemeral
# sandbox — isolated from the host and from each other.
#
# Find your host (gateway) IP:
#   docker network inspect openshell-cluster-openshell | grep Gateway
#   (Typically 172.20.0.1)
#
# Usage:
#   openshell sandbox create --policy sandbox-policy.yaml ...

version: 1

# ── Filesystem ──────────────────────────────────────────
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox          # Agent workspace (uploaded files land here)
    - /tmp              # Scratch space
    - /dev/null

landlock:
  compatibility: best_effort

# ── Process isolation ───────────────────────────────────
process:
  run_as_user: sandbox
  run_as_group: sandbox

# ── Network policies ───────────────────────────────────
# Only allow the endpoints your agents actually need.
# Everything else is blocked by default.
network_policies:

  # 1. Your service API
  #    Used by: Agent A (execute tasks) and Agent B (read results)
  #    ← CHANGE the port to match your service
  my_service:
    name: my-service
    endpoints:
      - host: 172.20.0.1        # Docker gateway IP (host machine)
        port: 8010               # ← CHANGE THIS to your service port
        protocol: tcp
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/curl
      - path: /bin/bash

  # 2. OpenClaw gateway (required — do not remove)
  #    Handles agent harness communication AND proxies LLM inference
  #    (inference.local → gateway → Ollama on host:11434)
  #    Used by: Agent A and Agent B
  openclaw_gateway:
    name: openclaw-gateway
    endpoints:
      - host: 172.20.0.1
        port: 18789
        protocol: tcp
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/bin/node
      - path: /bin/bash
