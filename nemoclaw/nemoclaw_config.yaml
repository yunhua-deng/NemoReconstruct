# NemoClaw Agent Configuration for NemoReconstruct
# This config declares the tools and capabilities the NemoClaw agent uses
# to navigate and control the NemoReconstruct application on DGX Spark.

agent:
  name: nemo-reconstruct-agent
  description: >
    NemoClaw agent for the NemoReconstruct 3D reconstruction pipeline.
    Orchestrates video uploads, monitors reconstruction jobs, tunes parameters,
    and retrieves output artifacts via API and shell commands.

  model:
    # Default: Ollama running locally on DGX Spark (port 11434)
    # Ollama exposes an OpenAI-compatible API at /v1
    provider: ollama
    endpoint: "${OLLAMA_ENDPOINT:-http://localhost:11434/v1}"
    model_name: "${OLLAMA_MODEL:-glm-4.7-flash}"
    temperature: 0.1
    max_tokens: 4096
    # NOTE: nemotron-3-nano hits a GGML CUDA backend bug (INT_MAX tensor copy)
    # on GB10 with Ollama 0.18.x. Use glm-4.7-flash until this is fixed.
    # Alternative: NVIDIA NIM (uncomment to use instead of Ollama)
    # provider: nim
    # endpoint: "${NIM_LLM_ENDPOINT:-http://localhost:8000/v1}"
    # model_name: "${NIM_LLM_MODEL:-meta/llama-3.3-70b-instruct}"

  system_prompt_file: system_prompt.md

  # ---------- Tool Sources ----------
  tools:
    # 1. OpenShell — gives the agent a local terminal on DGX Spark
    - type: openshell
      name: shell
      description: >
        Execute shell commands on the local DGX Spark system.
        Use for starting services, running ffmpeg, inspecting logs,
        and any operation not covered by the REST API.
      config:
        allowed_directories:
          - "${NEMO_RECONSTRUCT_ROOT:-.}"
          - "/tmp"
        blocked_commands:
          - "rm -rf /"
          - "shutdown"
          - "reboot"
          - "mkfs"
        timeout_seconds: 600

    # 2. OpenAPI — auto-generated tools from the NemoReconstruct backend
    - type: openapi
      name: nemo_reconstruct_api
      description: NemoReconstruct backend REST API
      config:
        spec_url: "${NEMO_RECONSTRUCT_API_URL:-http://127.0.0.1:8010}/openapi.json"
        base_url: "${NEMO_RECONSTRUCT_API_URL:-http://127.0.0.1:8010}"
        # Map OpenAPI operationIds to friendly tool names
        operation_map:
          health_health_get: check_health
          list_pipelines_api_v1_pipelines_get: list_pipelines
          upload_reconstruction_api_v1_reconstructions_upload_post: upload_video
          list_reconstructions_api_v1_reconstructions_get: list_reconstructions
          get_reconstruction_api_v1_reconstructions__reconstruction_id__get: get_reconstruction
          get_reconstruction_status_api_v1_reconstructions__reconstruction_id__status_get: get_status
          get_reconstruction_artifacts_api_v1_reconstructions__reconstruction_id__artifacts_get: get_artifacts
          download_artifact_api_v1_reconstructions__reconstruction_id__download__artifact__get: download_artifact
          retry_reconstruction_api_v1_reconstructions__reconstruction_id__retry_post: retry_reconstruction
          delete_reconstruction_api_v1_reconstructions__reconstruction_id__delete: delete_reconstruction

  # ---------- Guardrails ----------
  guardrails:
    max_iterations: 50
    confirm_destructive: true
    destructive_operations:
      - delete_reconstruction
      - "rm"
      - "kill"
